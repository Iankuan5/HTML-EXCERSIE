<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Club Registration</title>
</head>
<body>

    <h1>Book Club Registration</h1>

    <p>
        Welcome to our book club! We are a group of passionate readers who enjoy discussing 
        a wide range of books and sharing ideas. Join us to explore new genres, meet fellow 
        book lovers, and expand your reading experience.
    </p>

    <form>
        <div>
            <label for="fullname">Full Name:</label><br>
            <input type="text" id="fullname" name="fullname" placeholder="Enter your full name">
        </div>

        <br>

        <div>
            <label for="email">Email:</label><br>
            <input type="text" id="email" name="email" placeholder="Enter your email address">
        </div>

        <br>

        <div>
            <label for="genre">Favorite Book Genre:</label><br>
            <select id="genre" name="genre">
                <option value="">-- Select a genre --</option>
                <option value="fiction">Fiction</option>
                <option value="non-fiction">Non-Fiction</option>
                <option value="fantasy">Fantasy</option>
                <option value="sci-fi">Sci-Fi</option>
                <option value="mystery">Mystery</option>
            </select>
        </div>

        <br>

        <div>
            <label for="reason">Why do you want to join our book club?</label><br>
            <textarea id="reason" name="reason" rows="4" cols="50" placeholder="Share your reasons here..."></textarea>
        </div>

        <br>

        <div>
            <button type="submit">Register</button>
        </div>
    </form>

</body>
</html>
